{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{% static 'students/css/dashboard.css' %}" rel="stylesheet">
</head>
<body>
<main class="login-shell">
    <section class="login-card">
        <div class="login-brand">
            <span class="login-mark"><i class="bi bi-mortarboard-fill"></i></span>
            <div>
                <h1>Student MS</h1>
                <p>Sign in to continue.</p>
            </div>
        </div>

        {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="username" class="form-label fw-bold">Username</label>
                <input id="username" type="text" name="username" class="form-control" autocomplete="username" required>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-bold">Password</label>
                <input id="password" type="password" name="password" class="form-control" autocomplete="current-password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right"></i>
                <span>Login</span>
            </button>
        </form>
    </section>
</main>
</body>
</html>
